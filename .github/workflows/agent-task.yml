name: Agent Task

on:
  repository_dispatch:
    types: [agent-task]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

env:
  TASK_ID: ${{ github.event.client_payload.taskId }}
  TASK_FINGERPRINT: ${{ github.event.client_payload.taskFingerprint }}
  ISSUE_KEY: ${{ github.event.client_payload.issueKey }}
  SUMMARY: ${{ github.event.client_payload.summary }}
  DESCRIPTION: ${{ github.event.client_payload.description }}
  BRANCH_NAME: ${{ github.event.client_payload.branchName }}

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure git
        run: |
          git config user.name "jira-agent[bot]"
          git config user.email "jira-agent[bot]@users.noreply.github.com"

      - name: Create branch
        run: |
          git checkout -b "${{ env.BRANCH_NAME }}"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ANTHROPIC_MODEL: us.anthropic.claude-sonnet-4-20250514
          prompt: |
            You are an automation agent working on the react-automated repository.
            A Jira ticket has been assigned to you. Implement the requested changes.

            ## Jira Issue
            - Key: ${{ env.ISSUE_KEY }}
            - Summary: ${{ env.SUMMARY }}
            - Description: ${{ env.DESCRIPTION }}

            ## Instructions
            1. Read the issue summary and description carefully.
            2. Understand what code changes are needed in this React TypeScript project.
            3. Implement the changes with clean, well-structured code.
            4. Make sure the code compiles (run `npx tsc --noEmit` to check).
            5. If tests exist, make sure they pass.
            6. Keep changes minimal and focused on the ticket.
            7. Do NOT modify files in the `automation/` or `.github/` directories.

            ## Important
            - This is a Vite + React + TypeScript project.
            - Only change files relevant to the ticket.
            - Write clear commit messages.
            - If the task is unclear, implement the most reasonable interpretation and note assumptions.

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "feat(${{ env.ISSUE_KEY }}): ${{ env.SUMMARY }}

          Automated implementation by Jira agent.
          Task ID: ${{ env.TASK_ID }}
          " || true
          git push origin "${{ env.BRANCH_NAME }}"

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[${{ env.ISSUE_KEY }}] ${{ env.SUMMARY }}`,
              head: '${{ env.BRANCH_NAME }}',
              base: 'main',
              body: [
                `## Jira Issue`,
                `**Key:** ${{ env.ISSUE_KEY }}`,
                `**Summary:** ${{ env.SUMMARY }}`,
                ``,
                `## Description`,
                `${{ env.DESCRIPTION }}`,
                ``,
                `---`,
                `🤖 *Automated by Jira Agent (Task: ${{ env.TASK_ID }})*`,
              ].join('\n'),
            });
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_number', pr.number);

            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['agent-task'],
            });

      - name: Transition Jira to CODE REVIEW
        if: steps.pr.outputs.pr_url
        run: |
          # Get available transitions
          TRANSITIONS=$(curl -s -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Accept: application/json" \
            "https://${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ env.ISSUE_KEY }}/transitions")

          # Find CODE REVIEW transition ID
          TRANSITION_ID=$(echo "$TRANSITIONS" | jq -r '.transitions[] | select(.to.name | ascii_upcase == "CODE REVIEW") | .id' | head -1)

          if [ -n "$TRANSITION_ID" ] && [ "$TRANSITION_ID" != "null" ]; then
            curl -s -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -X POST \
              "https://${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ env.ISSUE_KEY }}/transitions" \
              -d "{\"transition\":{\"id\":\"$TRANSITION_ID\"}}"
            echo "Transitioned to CODE REVIEW"
          else
            echo "CODE REVIEW transition not found"
          fi

      - name: Post Jira Comment
        if: always()
        run: |
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          BRANCH="${{ env.BRANCH_NAME }}"
          HAS_CHANGES="${{ steps.changes.outputs.has_changes }}"

          if [ "$HAS_CHANGES" == "true" ] && [ -n "$PR_URL" ]; then
            COMMENT="🤖 Agent completed implementation.\n\n• Branch: ${BRANCH}\n• PR: ${PR_URL}\n• Status: Ready for code review\n\nThe ticket has been moved to CODE REVIEW."
          elif [ "$HAS_CHANGES" == "false" ]; then
            COMMENT="🤖 Agent reviewed the ticket but found no code changes needed.\n\nPlease review the issue description and clarify what needs to be done."
          else
            COMMENT="🔴 Agent encountered an issue during implementation.\n\n• Branch: ${BRANCH}\n• Check GitHub Actions logs for details.\n• You may need to retry by moving the ticket back to TODO → TRIGGER AGENT."
          fi

          curl -s -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -X POST \
            "https://${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ env.ISSUE_KEY }}/comment" \
            -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"$(echo -e "$COMMENT")\"}]}]}}"

      - name: Slack Notification
        if: always()
        run: |
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          HAS_CHANGES="${{ steps.changes.outputs.has_changes }}"

          if [ "$HAS_CHANGES" == "true" ] && [ -n "$PR_URL" ]; then
            EMOJI="🟢"
            STATUS="PR created — ready for review"
            PR_LINE="\n*PR:* ${PR_URL}"
          elif [ "$HAS_CHANGES" == "false" ]; then
            EMOJI="🟡"
            STATUS="No changes needed"
            PR_LINE=""
          else
            EMOJI="🔴"
            STATUS="Failed — check GitHub Actions logs"
            PR_LINE=""
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"${EMOJI} *Agent Task Complete* — \`${{ env.ISSUE_KEY }}\`\n*Summary:* ${{ env.SUMMARY }}\n*Status:* ${STATUS}${PR_LINE}\"}"

      - name: Update DynamoDB Task Status
        if: always()
        run: |
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          HAS_CHANGES="${{ steps.changes.outputs.has_changes }}"

          if [ "$HAS_CHANGES" == "true" ] && [ -n "$PR_URL" ]; then
            STATUS="pr_created"
          elif [ "$HAS_CHANGES" == "false" ]; then
            STATUS="completed_no_changes"
          else
            STATUS="failed"
          fi

          aws dynamodb update-item \
            --table-name "${{ secrets.DYNAMODB_TABLE }}" \
            --key "{\"taskFingerprint\":{\"S\":\"jira:${{ env.ISSUE_KEY }}\"},\"taskId\":{\"S\":\"${{ env.TASK_ID }}\"}}" \
            --update-expression "SET #s = :status, updatedAt = :now, prUrl = :pr" \
            --expression-attribute-names '{"#s":"status"}' \
            --expression-attribute-values "{\":status\":{\"S\":\"${STATUS}\"},\":now\":{\"S\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"},\":pr\":{\"S\":\"${PR_URL:-none}\"}}" \
            --region "${{ secrets.AWS_REGION }}" \
            2>/dev/null || echo "DynamoDB update skipped (no AWS creds in this context)"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
